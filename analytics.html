<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Updato Analytics — Swipes</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b0d12; --card: #141821; --text: #f2f4f8; --muted: #8b95a8;
      --accent: #4f7cff; --warn: #f59e0b; --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(900px 400px at 20% -10%, rgba(79,124,255,.18), transparent), var(--bg);
      color: var(--text); min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 48px; }
    header { display: flex; justify-content: space-between; align-items: end; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .logo { font-weight: 900; letter-spacing: 1px; font-size: 22px;
      background: linear-gradient(90deg, var(--accent), #8a5cff);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 18px; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .card .value { font-size: 36px; font-weight: 800; margin-top: 6px; line-height: 1.1; }
    .card .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .chart-wrap { padding: 8px 8px 16px; }
    canvas { width: 100% !important; max-height: 320px; }
    .status { margin-top: 14px; font-size: 13px; color: var(--muted); }
    .status.err { color: var(--warn); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="logo">UPDATO · SWIPES</div>
        <div class="sub">Totals only · no live users · free-tier friendly</div>
      </div>
      <div class="sub" id="updated">connecting…</div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="label">Swipes (24h)</div>
        <div class="value" id="swipes24">—</div>
        <div class="hint">Sum of last 24 IST hours</div>
      </div>
      <div class="card">
        <div class="label">This hour</div>
        <div class="value" id="swipesNow">—</div>
        <div class="hint" id="hourLabel">IST</div>
      </div>
    </div>

    <div class="card chart-wrap">
      <div class="label" style="padding:10px 12px 0">Swipes · last 24 hours</div>
      <canvas id="chart" height="120"></canvas>
    </div>

    <div class="status" id="status">Loading…</div>
  </div>

  <script>
    const DB_URL = "https://updato-9368e-default-rtdb.asia-southeast1.firebasedatabase.app";

    function istNow() {
      return new Date(Date.now() + (5.5 * 60 * 60 * 1000));
    }
    function hourKeyFromDate(d) {
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, "0");
      const day = String(d.getUTCDate()).padStart(2, "0");
      const h = String(d.getUTCHours()).padStart(2, "0");
      return `${y}-${m}-${day}-${h}`;
    }
    function last24Keys() {
      const keys = [];
      const base = istNow();
      for (let i = 23; i >= 0; i--) {
        keys.push(hourKeyFromDate(new Date(base.getTime() - i * 3600 * 1000)));
      }
      return keys;
    }
    function labelHour(key) { return key.slice(11) + ":00"; }

    let chart;
    function ensureChart(labels, values) {
      const ctx = document.getElementById("chart").getContext("2d");
      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.update("none");
        return;
      }
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Swipes",
            data: values,
            borderColor: "#4f7cff",
            backgroundColor: "rgba(79,124,255,.18)",
            fill: true,
            tension: 0.35,
            pointRadius: 2,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#8b95a8", maxRotation: 0, autoSkip: true, maxTicksLimit: 12 }, grid: { color: "rgba(255,255,255,.04)" } },
            y: { beginAtZero: true, ticks: { color: "#8b95a8", precision: 0 }, grid: { color: "rgba(255,255,255,.06)" } },
          },
        },
      });
    }

    async function refresh() {
      const status = document.getElementById("status");
      try {
        const res = await fetch(`${DB_URL}/hourly.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const hourly = await res.json();
        const keys = last24Keys();
        const values = keys.map((k) => {
          const row = hourly && hourly[k];
          return row ? Number(row.swipes || 0) : 0;
        });
        const total24 = values.reduce((a, b) => a + b, 0);
        document.getElementById("swipes24").textContent = total24.toLocaleString();
        document.getElementById("swipesNow").textContent = values[values.length - 1].toLocaleString();
        document.getElementById("hourLabel").textContent = "Hour " + keys[keys.length - 1] + " (IST)";
        ensureChart(keys.map(labelHour), values);
        document.getElementById("updated").textContent = "updated " + new Date().toLocaleTimeString();
        status.className = "status";
        status.textContent = total24.toLocaleString() + " swipes in last 24h";
      } catch (e) {
        status.className = "status err";
        status.textContent = "Cannot read hourly stats: " + e.message;
      }
    }

    refresh();
    setInterval(refresh, 30000); // 30s — dashboard only, not per-user
  </script>
</body>
</html>
